<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOG Chat</title>
<style>
  body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; background: #f0f2f5; }
  .card { background: white; border-radius: 16px; padding: 40px; max-width: 420px; margin: 30px auto; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .btn { display: block; margin: 12px auto; padding: 14px 32px; background: #2563eb; color: white; border-radius: 12px; text-decoration: none; font-size: 16px; }
  .btn:hover { background: #1d4ed8; }
  .admin { font-size: 13px; color: #6b7280; margin-top: 20px; }
  .admin a { color: #6b7280; }
  .time { font-size: 12px; color: #9ca3af; margin-top: 16px; }
  .spinner { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <p style="color:#6b7280">正在检测服务器状态...</p>
</div>
<script>
(function(){
  var h=document.getElementById('card'),
      CHECK_URL='/api/auth/admin-info',
      TIMEOUT=8;

  function show(s){ h.innerHTML=s; }
  function offline(){ show('<h1 style="font-size:48px;margin-bottom:16px">&#x1f534;</h1><p style="color:#6b7280;font-size:16px">服务器离线</p><p style="color:#6b7280;font-size:16px">请稍后再来</p><p style="color:#9ca3af;font-size:12px;margin-top:8px" id="hint"></p>'); }
  function online(url, st, t){
    if(st==='resting') return show('<h1 style="font-size:48px">&#x1f4a4;</h1><p style="color:#6b7280;font-size:16px">管理员正在休息</p><p style="color:#6b7280;font-size:16px">请稍后再来</p>');
    if(st==='disk-warn') return show('<h1 style="color:#dc2626">&#x26a0; 存储告警</h1><p style="color:#6b7280;font-size:16px">服务器磁盘空间已超过80%</p><p style="color:#6b7280;font-size:16px">管理员正在处理，请稍后访问</p>');
    if(!url || url.indexOf('trycloudflare')<0) return offline();
    // Use CORS fetch — when tunnel alive, our server returns Access-Control-Allow-Origin:*.
    // When tunnel dead, CF edge returns 502/1033 WITHOUT CORS headers, browser blocks it → goes to catch → offline.
    var ctrl=new AbortController();
    var to=setTimeout(function(){ctrl.abort();},TIMEOUT*1000);
    fetch(url+CHECK_URL+'?t='+t,{signal:ctrl.signal,cache:'no-store'})
      .then(function(r){
        clearTimeout(to);
        if(r.ok || r.status===401||r.status===403) showEntry(url);
        else offline();
      })
      .catch(function(e){ clearTimeout(to); showOfflineWithRetry(url,t); });
  }
  var retrying = false;
  function showOfflineWithRetry(url, t) {
    var h=document.getElementById('hint');
    show('<h1 style="font-size:48px;margin-bottom:16px">&#x1f534;</h1><p style="color:#6b7280;font-size:16px">服务器离线</p><p style="color:#6b7280;font-size:16px">请稍后再来</p><p style="color:#9ca3af;font-size:12px;margin-top:8px" id="hint">正在自动重试...</p>');
    if(!retrying){
      retrying=true;
      setTimeout(function(){retrying=false;online(url,'online',t);},5000);
    }
  }
  function showEntry(url){
    show('<h1>王者荣耀查询</h1><p style="color:#6b7280;margin-bottom:24px">点击下方按钮进入聊天</p><a class="btn" href="'+url+'/static/user/login.html">进入聊天</a><p class="admin">管理员入口：<a href="'+url+'/static/admin/login.html">管理后台</a></p>');
  }

  function start(t){
    fetch('status.txt?t='+t,{cache:'no-store'}).then(function(r){return r.text()}).then(function(s){
      var st=s.trim();
      if(st==='resting'||st==='disk-warn'){ online('',st); return; }
      fetch('url.txt?t='+t,{cache:'no-store'}).then(function(r){return r.text()}).then(function(u){
        online(u.trim(),st,t);
      }).catch(offline);
    }).catch(offline);
  }
  start(Date.now());
})();
</script>
</body>
</html>
